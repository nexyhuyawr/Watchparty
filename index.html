<!DOCTYPE html>
<html>

<head>

<title>Watch Together</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:sans-serif;
margin:0;
}

#top{
padding:15px;
background:#111;
}

input{
width:65%;
padding:10px;
}

button{
padding:10px;
}

iframe, video{
width:100%;
height:80vh;
border:none;
}

</style>

</head>

<body>

<div id="top">

<h2>Watch Together</h2>

<input id="link" placeholder="Paste video or movie link">

<button onclick="play()">Play</button>

</div>

<div id="player"></div>

<script>

function play(){

let link=document.getElementById("link").value
let player=document.getElementById("player")

// YouTube short
if(link.includes("youtu.be")){
let id=link.split("youtu.be/")[1]
player.innerHTML=`<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`
}

// YouTube normal
else if(link.includes("youtube.com")){
let id=link.split("v=")[1]
player.innerHTML=`<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`
}

// Direct video file
else if(link.endsWith(".mp4") || link.endsWith(".m3u8")){
player.innerHTML=`<video src="${link}" controls autoplay></video>`
}

// Other movie sites
else{
player.innerHTML=`<iframe src="${link}" allowfullscreen></iframe>`
}

}

</script>

</body>

</html>
